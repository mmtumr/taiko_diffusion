data:
  source_index: data/cache/encoder_v1/index.csv
  source_split_dir: data/splits/encoder_final_main
  cache_dir: data/cache/diffusion_v0
  frame_ms: 46.4399
  window_frames: 512
  stride_frames: 256
  min_events_per_window: 1
  target_channels:
    - don
    - ka
    - roll_start
    - roll_body
    - roll_end
    - balloon_start
    - balloon_body
    - balloon_end
  condition_names:
    - const
    - complex
    - hs_change
    - bpm_rhythm_bin
    - note_type
    - note_type_high
    - avg_density
    - peak_density
    - big_note_ratio
    - balloon_roll_ratio

model:
  chart_channels: 8
  cond_dim: 10
  base_channels: 64
  channel_mults:
    - 1
    - 2
    - 4
  dropout: 0.1

diffusion:
  timesteps: 200
  beta_start: 0.0001
  beta_end: 0.02

training:
  seed: 20260624
  batch_size: 16
  epochs: 20
  learning_rate: 0.0002
  weight_decay: 0.00001
  checkpoint_dir: checkpoints/diffusion_v0
  log_dir: logs/diffusion_v0
  num_workers: 0
  positive_loss_weight: 2.0
