data:
  manifest: data/manifests/strict_matched_dataset.csv
  frame_ms: 46.4399
  max_frames: 8192
  discard_branch: true
  target_columns:
    - const
    - complex
    - avg_density
    - peak_density
    - big_note_ratio
    - ka_ratio
    - alternation_rate
    - bpm_change
    - hs_change
    - subjective_complexity_bin
    - combo
    - roll_time
    - balloon_num

chart_grid:
  channels:
    - don
    - ka
    - big_don
    - big_ka
    - roll_start
    - roll_body
    - roll_end
    - balloon_start
    - balloon_body
    - balloon_end
    - gogo
    - barline
    - bpm
    - bpm_change_event
    - bpm_delta
    - scroll
    - scroll_change_event
    - scroll_delta
    - measure
    - active
    - bpm_abs_delta
    - bpm_event_local_density
    - bpm_event_cumsum
    - scroll_abs_delta
    - scroll_event_local_density
    - scroll_event_cumsum

model:
  name: taiko_encoder_v5_class
  branched_sparse: true
  core_targets: const,complex,avg_density,peak_density,big_note_ratio,ka_ratio,alternation_rate,subjective_complexity_bin,combo,roll_time,balloon_num
  sparse_targets: bpm_change,hs_change
  class_targets: subjective_complexity_bin
  class_dims:
    subjective_complexity_bin: 3
  latent_dim: 256
  conv_channels: 128
  shared_downsample_layers: 2
  branch_downsample_layers: 2
  core_transformer_layers: 2
  event_transformer_layers: 1
  transformer_heads: 8
  dropout: 0.12

training:
  batch_size: 4
  epochs: 80
  learning_rate: 0.00025
  weight_decay: 0.00015
  seed: 20260620
  split_dir: data/splits/encoder_v5
  stats_path: data/splits/encoder_v5/label_stats.json
  cache_dir: data/cache/encoder_v5
  checkpoint_dir: checkpoints/encoder_v5_class
  early_stop_patience: 12
  early_stop_min_delta: 0.001
  positive_loss_threshold: 0.0
  sparse_class_loss_weight: 0.35
  sparse_regression_weight: 1.0
  class_loss_weight: 1.2
  loss_weights:
    const: 1.0
    complex: 1.0
    avg_density: 1.0
    peak_density: 1.0
    big_note_ratio: 1.5
    ka_ratio: 1.5
    alternation_rate: 1.5
    bpm_change: 1.3
    hs_change: 1.3
    subjective_complexity_bin: 0.0
    combo: 1.0
    roll_time: 1.0
    balloon_num: 1.0
  positive_loss_weights:
    bpm_change: 1.0
    hs_change: 1.0
  sparse_pos_weights:
    bpm_change: 1.9
    hs_change: 1.0

eval:
  sparse_eval_mode: prob_scale
  sparse_threshold: 0.5
