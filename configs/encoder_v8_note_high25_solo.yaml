data:
  manifest: data/manifests/strict_matched_dataset.csv
  frame_ms: 46.4399
  max_frames: 8192
  discard_branch: true
  target_columns:
    - note_rhythm_high25

chart_grid:
  channels:
    - don
    - ka
    - roll_start
    - roll_body
    - roll_end
    - balloon_start
    - balloon_body
    - balloon_end
    - gogo
    - barline
    - bpm
    - bpm_change_event
    - bpm_delta
    - scroll
    - scroll_change_event
    - scroll_delta
    - measure
    - active
    - bpm_abs_delta
    - bpm_event_local_density
    - bpm_event_cumsum
    - scroll_abs_delta
    - scroll_event_local_density
    - scroll_event_cumsum
    - note_density_short
    - note_density_long
    - color_change_event
    - color_change_density
    - prev_note_interval
    - next_note_interval
    - bar_phase

derived_grid:
  collapse_big_notes: true
  add_event_tracks: true
  add_pattern_tracks: true

model:
  name: taiko_encoder_v8_note_high25_solo
  branched_sparse: true
  core_targets: note_rhythm_high25
  sparse_targets:
  class_targets: note_rhythm_high25
  class_dims:
    note_rhythm_high25: 2
  class_detach: false
  latent_dim: 192
  conv_channels: 96
  shared_downsample_layers: 2
  branch_downsample_layers: 2
  core_transformer_layers: 2
  event_transformer_layers: 1
  transformer_heads: 8
  dropout: 0.12

training:
  batch_size: 6
  epochs: 60
  learning_rate: 0.00025
  weight_decay: 0.00015
  seed: 20260619
  split_dir: data/splits/encoder_v8_note_high25_solo
  stats_path: data/splits/encoder_v8_note_high25_solo/label_stats.json
  cache_dir: data/cache/encoder_v8_note_high25
  checkpoint_dir: checkpoints/encoder_v8_note_high25_solo
  early_stop_patience: 8
  early_stop_min_delta: 0.001
  positive_loss_threshold: 0.0
  class_loss_weight: 1.0
  loss_weights:
    note_rhythm_high25: 0.0

eval:
  sparse_eval_mode: prob_scale
  sparse_threshold: 0.5
