data:
  cache_dir: data/cache/diffusion_v13_mug_holds
  audio_cache_dir: data/cache/audio_v0
  hold_substitution_hint_dir: data/cache/hold_substitution_hints_v0
  event_oversample:
    hold_substitution_hint: 10.0
    hold_start: 4.0
    bpm_change_event: 2.0
    scroll_change_event: 2.0

autoencoder:
  checkpoint: checkpoints/autoencoder_kl_v13_mug_holds/best.pt
  latent_stats: checkpoints/autoencoder_kl_v13_mug_holds/latent_stats.json

model:
  latent_channels: 16
  cond_dim: 11
  audio_channels: 67
  use_legal_mask_channel: true
  audio_fusion: mug_scale
  audio_scale_blocks: 2
  base_channels: 128
  channel_mults: [1, 2, 2]
  dropout: 0.0
  audio_context_dim: 128
  audio_context_tokens: 128
  audio_attention_heads: 4

diffusion:
  timesteps: 200
  beta_start: 0.0001
  beta_end: 0.02

training:
  seed: 20260713
  batch_size: 8
  epochs: 1
  learning_rate: 0.00002
  weight_decay: 0.00001
  checkpoint_dir: checkpoints/latent_diffusion_v13_hold_substitution_rank_mid
  log_dir: logs/latent_diffusion_v13_hold_substitution_rank_mid
  num_workers: 0
  condition_dropout: 0.1
  audio_dropout: 0.1
  decoded_x0_loss_weight: 0.6
  decoded_loss_type: bce
  decoded_onset_loss_weight: 0.25
  decoded_positive_loss_weight: 4.0
  decoded_channel_positive_weights: [4.0, 4.0, 8.0, 8.0, 40.0, 16.0, 40.0, 32.0, 1.0, 32.0, 1.0]
  onset_weight_scale: 2.5
  hold_substitution_ranking:
    const_index: 0
    high_const_normalized: 0.725917
    hold_body_channel: 5
    note_channels: [0, 1, 2, 3]
    margin: 0.1
    weight: 0.15
  init_checkpoint: checkpoints/latent_diffusion_v13_hold_substitution/best.pt
  condition_names: [const, complex_bin, subdivision_bin, hs_change_bin, bpm_rhythm_bin, note_type_bin, avg_density_bin, peak_density_bin, big_note_ratio, balloon_roll_ratio, ka_ratio]
  init_condition_names: [const, complex_bin, subdivision_bin, hs_change_bin, bpm_rhythm_bin, note_type_bin, avg_density_bin, peak_density_bin, big_note_ratio, balloon_roll_ratio, ka_ratio]
